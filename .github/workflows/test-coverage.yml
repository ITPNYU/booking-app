name: Playwright Tests

on:
  push:
    branches: [ test-coverage ]
  pull_request:
    branches: [ test-coverage ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: cd booking-app && npm ci

      - run: cd booking-app && npx playwright install --with-deps

      - run: |
          cd booking-app && npm run dev &  # Start the Next.js development server in the background
          npx wait-on http://localhost:3000
          cd test
          npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: booking-app/playwright-report/
          retention-days: 30
