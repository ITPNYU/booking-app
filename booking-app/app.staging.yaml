runtime: nodejs20
instance_class: B1
service: staging

basic_scaling:
  max_instances: 10
  idle_timeout: 5m

env_variables:
  NEXT_PUBLIC_BRANCH_NAME: "staging"
  NODE_OPTIONS: "--max-old-space-size=4096"
  TZ: "America/New_York"

build_env_variables:
  NODE_OPTIONS: "--max-old-space-size=4096"

handlers:
  - url: /(.*)
    script: auto
